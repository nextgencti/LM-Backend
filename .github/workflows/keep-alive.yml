name: Keep Backend Alive

on:
  schedule:
    # Runs every 14 minutes to stay within Render's 15-min idle limit
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          curl -f -s https://lm-backend-ye3p.onrender.com/ping || echo "Ping failed but continuing..."
